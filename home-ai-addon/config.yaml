name: "Home AI Addon"
version: "0.3.15"
slug: home_ai_addon
description: "Home AI Addon: ASP.NET Core 9, React (Vite), SQLite, Ingress."
url: "https://github.com/Radon240/HomeAssistantAddons"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:home-automation
panel_title: "Home AI"
arch:
  - aarch64
  - amd64
homeassistant_api: true
map:
  - data
options:
  display_name: "Home AI Addon"
  enable_verbose_api: false
  home_assistant_base_url: ""
  entity_filter: []
  domain_filter: []
  analysis_exclude_entities: []
  analysis_exclude_domains: []
  anomaly_detection_enabled: true
  anomaly_detection_interval_minutes: 15
schema:
  display_name: str?
  enable_verbose_api: bool?
  home_assistant_base_url: str?
  entity_filter:
    - str
  domain_filter:
    - str
  analysis_exclude_entities:
    - str
  analysis_exclude_domains:
    - str
  anomaly_detection_enabled: bool?
  anomaly_detection_interval_minutes: int(5,1440)?
watchdog: "http://[HOST]:[PORT:8099]/health"
